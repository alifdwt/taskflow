services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_USER: taskflow_user
      POSTGRES_PASSWORD: taskflow_password
      POSTGRES_DB: taskflow_dev
    ports:
      - "5434:5432" # Changed to 5434 to avoid conflict
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - taskflow_network

  # Redis untuk session management (optional, akan dipakai nanti)
  redis:
    image: redis:7-alpine
    container_name: taskflow_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - taskflow_network

volumes:
  postgres_data:

networks:
  taskflow_network:
    driver: bridge
